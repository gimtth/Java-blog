spring:
  application:
    name: online-blog-system
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/blog_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 2s
  sql:
    init:
      mode: always

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  cors:
    allowed-origin: http://localhost:5173
  auth:
    seed-username: ${ADMIN_USERNAME:admin}
    seed-password: ${ADMIN_PASSWORD:admin123}
    jwt-secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    jwt-expiration-minutes: 240
  cache:
    hot-post-ttl-minutes: 30
