    allowed-origin: http://localhost:5173
  auth:
    seed-username: admin
    seed-password: admin123
    jwt-secret: 0123456789012345678901234567890123456789012345678901234567890123
    jwt-expiration-minutes: 240
  cache:
    hot-post-ttl-minutes: 30
